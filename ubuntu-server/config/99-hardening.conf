# ============================================================
# Limites système — Defend-The-Core (Ubuntu Server)
# ============================================================
# Référence statique. Emplacement production :
# /etc/security/limits.d/99-dtc.conf
# ============================================================

# Limites par utilisateur
*    hard    core    0          # Pas de core dumps (anti fuite mémoire)
*    hard    nproc   4096       # Max processus (anti fork bomb)
*    hard    nofile  65535      # Max fichiers ouverts
*    soft    nofile  65535
root    hard    nproc   unlimited
