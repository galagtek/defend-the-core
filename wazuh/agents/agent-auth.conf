# ============================================================
# Wazuh — Configuration d'authentification des agents
# ============================================================
# Ce fichier documente les paramètres d'enrôlement des agents.
# Les valeurs réelles sont dans .env (jamais versionnées).
# ============================================================

# --- Enrôlement automatique (agent-auth) ---
# Les agents s'enrôlent automatiquement auprès du manager.
# Le manager accepte les nouveaux agents avec un mot de passe partagé.

# Mot de passe d'enrôlement (à définir dans .env)
# WAZUH_REGISTRATION_PASSWORD=...

# Commande d'enrôlement manuel (si nécessaire) :
# /var/ossec/bin/agent-auth -m 10.10.99.10 -P "$WAZUH_REGISTRATION_PASSWORD" \
#   -A "nom_agent" -G "groupe_agent"

# --- Gestion des groupes d'agents ---
# Groupes définis sur le manager pour appliquer des configs ciblées :
#   - linux       : tous les agents Linux (Ubuntu, NixOS, Kali)
#   - windows     : tous les agents Windows (Server, Win10)
#   - critical    : serveurs du VLAN 30 (Ubuntu, Win Server)
#   - admin       : bastion et Wazuh (VLAN 99)
#   - workstation : postes clients du VLAN 10 (Win10)

# Création des groupes sur le manager :
# /var/ossec/bin/agent-groups -a -g linux -q
# /var/ossec/bin/agent-groups -a -g windows -q
# /var/ossec/bin/agent-groups -a -g critical -q
# /var/ossec/bin/agent-groups -a -g admin -q
# /var/ossec/bin/agent-groups -a -g workstation -q

# --- Rotation des clés ---
# Les clés partagées doivent être rotées tous les 90 jours.
# Procédure :
#   1. Générer une nouvelle clé : openssl rand -hex 32
#   2. La déployer sur le manager et tous les agents
#   3. Redémarrer les services
