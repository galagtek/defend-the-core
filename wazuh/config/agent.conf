<?xml version="1.0" encoding="UTF-8"?>
<!--
  ============================================================
  Wazuh — Configuration commune des agents (agent.conf)
  ============================================================
  À déposer dans : /var/ossec/etc/shared/agent.conf (manager)
  Cette config est poussée vers TOUS les agents du groupe.
  Des variantes par groupe existent dans /var/ossec/etc/shared/<groupe>/
  ============================================================
-->
<agent_config>

  <!-- ============ Analyse des logs ============ -->

  <!-- Linux : auth.log (SSH, sudo, su) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Linux : syslog système -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Linux : auditd (traçabilité des actions sensibles) -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- Linux : sudo -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/sudo.log</location>
  </localfile>

  <!-- Windows : Security event log -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Security</location>
  </localfile>

  <!-- Windows : System event log -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>System</location>
  </localfile>

  <!-- Windows : Application event log -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Application</location>
  </localfile>

  <!-- Windows : PowerShell (détection scripts malveillants) -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-PowerShell/Operational</location>
  </localfile>

  <!-- ============ Configuration du agent ============ -->
  <client>
    <config-profile>defend-the-core</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
  </client>

  <!-- ============ Collecte de données système (Syscollector) ============ -->
  <!-- Inventaire des paquets, processus, ports réseau (SCA) -->
  <syscollector>
    <disabled>no</disabled>
    <interval>1h</interval>
    <network>yes</network>
    <os>yes</os>
    <hardware>yes</hardware>
    <packages>yes</packages>
    <processes>yes</processes>
    <ports all="no">yes</ports>
  </syscollector>

  <!-- ============ Security Configuration Assessment (SCA) ============ -->
  <!-- Vérification continue du durcissement (CIS Benchmark) -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
    <policies>
      <!-- Linux -->
      <policy>cis_ubuntu22-04.yml</policy>
      <policy>cis_debian_linux_11.yml</policy>
      <!-- Windows -->
      <policy>cis_win11_enterprise.yml</policy>
      <policy>cis_win2022.yml</policy>
    </policies>
  </sca>

  <!-- ============ Rootkit detection (Rootcheck) ============ -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>  <!-- 12h -->
  </rootcheck>

  <!-- ============ File Integrity Monitoring (FIM) ============ -->
  <!-- Surveillance des fichiers critiques -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>  <!-- 12h scan complet -->

    <!-- Fichiers surveillés (Linux) -->
    <directories>/etc,/usr/bin,/usr/sbin,/bin,/sbin</directories>
    <directories>/etc/nixos</directories>
    <directories>/var/ossec/etc</directories>

    <!-- Fichiers surveillés (Windows) -->
    <directories realtime="yes">C:\Windows\System32</directories>
    <directories realtime="yes">C:\Program Files</directories>

    <!-- Registre Windows -->
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services</windows_registry>

    <!-- Ignorer les fichiers non pertinents -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/var/log</ignore>

    <nodiff>/etc/ssl/private</nodiff>
  </syscheck>

  <!-- =itelist des IP de confiance (pas d'alerte) ============ -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

</agent_config>
