<?xml version="1.0" encoding="UTF-8"?>
<!--
  ============================================================
  Wazuh — Configuration du manager (ossec.conf)
  ============================================================
  À déposer dans : /var/ossec/etc/ossec.conf (manager)
  Ce fichier complète/override la config par défaut.
  ============================================================
-->
<ossec_config>

  <!-- ============ Configuration globale ============ -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>yes</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@defendcore.local</email_from>
    <email_to>admin@defendcore.local</email_to>
    <email_maxperhour>12</email_maxperhour>
  </global>

  <!-- ============ Niveau d'alerte ============ -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>10</email_alert_level>
  </alerts>

  <!-- ============ Réception des agents ============ -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <local_ip>10.10.99.10</local_ip>
  </remote>

  <!-- ============ Réception syslog distant (OPNsense) ============ -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>10.10.10.0/24</allowed-ips>
    <allowed-ips>10.10.20.0/24</allowed-ips>
    <allowed-ips>10.10.30.0/24</allowed-ips>
    <allowed-ips>10.10.99.0/24</allowed-ips>
    <local_ip>10.10.99.10</local_ip>
  </remote>

  <!-- ============ Analyse des logs locaux ============ -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- ============ Active Response ============ -->
  <!-- Commande : blocage d'IP via API OPNsense -->
  <command>
    <name>block-attacker</name>
    <executable>block-attacker.sh</executable>
    <expect>srcip</expect>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Déclenchement : règles Defend-The-Core (bruteforce, scan, latéral) -->
  <active-response>
    <command>block-attacker</command>
    <location>local</location>
    <rules_id>100100,100101,100200,100201,100300,100301</rules_id>
    <timeout>3600</timeout>
    <!-- L'IP est débloquée après 1h. Recommandation : ajuster selon la sévérité. -->
  </active-response>

  <!-- ============ Intégration OPNsense ============ -->
  <!-- Wazuh peut interroger l'API OPNsense pour enrichir les alertes -->
  <integration>
    <name>opnsense</name>
    <api_url>https://10.10.99.1/api</api_url>
    <api_key>REPLACE_IN_PRODUCTION</api_key>
    <api_secret>REPLACE_IN_PRODUCTION</api_secret>
    <rule_id>100200,100201</rule_id>
    <alert_format>json</alert_format>
  </integration>

  <!-- ============ Rotation des logs ============ -->
  <logs>
    <rotation>
      <max_size>100M</max_size>
      <max_files>10</max_files>
    </rotation>
  </logs>

  <!-- ============ Vulnérabilités (Vulnerability Detection) ============ -->
  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>12h</interval>
    <!-- Sources de CVE -->
    <provider name="canonical">  <!-- Ubuntu -->
      <enabled>yes</enabled>
      <os>resolute</os>
    </provider>
    <provider name="nvd">
      <enabled>yes</enabled>
    </provider>
    <provider name="msu">  <!-- Microsoft -->
      <enabled>yes</enabled>
    </provider>
  </vulnerability-detector>

</ossec_config>
